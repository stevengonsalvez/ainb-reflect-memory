name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref so a series of pushes doesn't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint + type-check + fast unit tests on the SLIM ([dev]) install.
  #
  # We deliberately do NOT install the [graph] extra here: it pulls
  # sentence-transformers -> torch (~2GB) and nano-graphrag's import-time
  # chain. graph_engine.py lazy-imports that stack inside _get_graph_engine(),
  # and the unit tests under tests/ stub networkx / inject a fake
  # sentence_transformers (or pytest.importorskip), so the base suite is green
  # without it. The heavy GraphRAG + LOCOMO suites live under tests/eval/ and
  # need [graph] + model downloads + an API key — they are excluded here.
  # ---------------------------------------------------------------------------
  test:
    name: lint + test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'pyproject.toml'

      - name: install package (dev extra only — NOT graph) into a uv venv
        # uv venv creates .venv and downloads the matrix interpreter if needed;
        # uv pip install targets that venv; uv run executes inside it. We do NOT
        # use `uv pip install --system`: the runner's interpreter is externally
        # managed (PEP 668), so --system aborts with exit 2.
        # [dev] gives ruff/mypy/pytest/respx/jsonschema. [graph] is intentionally
        # omitted (see job comment): the graph stack lazy-imports, so the slim
        # suite is green without it.
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e '.[dev]'

      - name: ruff check
        # NON-BLOCKING for now: the freshly-extracted engine carries a backlog
        # of style violations (f-strings w/o placeholders, semicolon-joined
        # statements in tests/eval/locomo plot scripts, a few unused imports).
        # Ruff still RUNS on every PR via --output-format=github so the
        # annotations show inline; flip continue-on-error off once the backlog
        # is cleared (`ruff check --fix src/reflect_kb tests`).
        continue-on-error: true
        run: uv run ruff check --output-format=github src/reflect_kb tests

      - name: mypy (src/reflect_kb)
        # NON-BLOCKING: src/reflect_kb is not fully typed yet, and the slim
        # install is missing stubs for the optional graph stack
        # (sentence_transformers / numpy / nano_graphrag) plus PyYAML
        # (types-PyYAML). Those import-not-found / import-untyped errors are
        # expected on the slim build. Runs for signal; does not gate the build.
        continue-on-error: true
        run: uv run mypy src/reflect_kb

      - name: pytest (fast unit tests; excludes heavy tests/eval suite)
        # THE gate. tests/eval/{behavioral,locomo} need the [graph] extra,
        # model downloads, and (LOCOMO) an Anthropic API key, so they are
        # excluded here. Everything directly under tests/ runs on the slim
        # install.
        run: uv run pytest -q tests --ignore=tests/eval

  # ---------------------------------------------------------------------------
  # Playwright e2e for the `reflect serve` memory browser. The suite launches
  # `reflect serve` against a FRESH copy of tests/e2e/fixture-kb (never the real
  # ~/.learnings) and drives all six curation/browse flows plus weightage
  # displays. serve.py uses only base deps (stdlib http + pyyaml), so the slim
  # install is enough — no [graph] extra needed. Screenshots + results.json are
  # uploaded as artifacts on every run.
  # ---------------------------------------------------------------------------
  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: 'pyproject.toml'

      - name: install package into a uv venv (slim — serve needs only base deps)
        run: |
          uv venv --python 3.12
          uv pip install -e '.[dev]'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install e2e deps
        working-directory: tests/e2e
        run: npm install

      - name: install playwright chromium
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: run e2e suite (starts reflect serve against fixture copy)
        working-directory: tests/e2e
        env:
          CI: 'true'
        run: npx playwright test

      - name: upload screenshots + results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: |
            tests/e2e/test-results/screenshots/
            tests/e2e/test-results/results.json
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Lightweight manifest validation. The Claude Code plugin ships its manifest
  # at BOTH plugin/.claude-plugin/plugin.json (the canonical Claude Code
  # location) and plugin/plugin.json (root mirror). Both must be valid JSON and
  # declare name + version. No package install needed — stdlib json only.
  # ---------------------------------------------------------------------------
  plugin-manifest:
    name: validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: validate plugin.json files (valid JSON + name + version)
        run: |
          python -c '
          import json, sys

          paths = ["plugin/.claude-plugin/plugin.json", "plugin/plugin.json"]
          failed = False
          for p in paths:
              try:
                  with open(p) as fh:
                      data = json.load(fh)
              except FileNotFoundError:
                  print(f"::error file={p}::manifest not found")
                  failed = True
                  continue
              except json.JSONDecodeError as exc:
                  print(f"::error file={p}::invalid JSON: {exc}")
                  failed = True
                  continue
              name = data.get("name")
              version = data.get("version")
              if not name:
                  print(f"::error file={p}::missing required field: name")
                  failed = True
              if not version:
                  print(f"::error file={p}::missing required field: version")
                  failed = True
              if name and version:
                  print(f"ok: {p} -> name={name} version={version}")
          sys.exit(1 if failed else 0)
          '
